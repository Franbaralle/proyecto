<section class="auth-container">
  <h2>Acceso de pacientes</h2>
  <p>Ingrese sus datos para acceder a sus cuestionarios.</p>

  <form (ngSubmit)="submit()" class="auth-form">
    <label for="email">Email</label>
    <input
      id="email"
      name="email"
      type="email"
      [(ngModel)]="email"
      placeholder="tu@email.com"
    />

    <label for="password">Contraseña</label>
    <input
      id="password"
      name="password"
      type="password"
      [(ngModel)]="password"
      placeholder="••••••"
    />

    <p class="auth-error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <button type="submit" [disabled]="isLoading">
      {{ isLoading ? 'Ingresando...' : 'Ingresar' }}
    </button>
  </form>

  <div class="auth-links">
    <p>¿No tienes cuenta? <a routerLink="/registro">Regístrate aquí</a></p>
    <a routerLink="/acceso-reportes" class="auth-link-volver">← Volver</a>
  </div>
</section>
